################################################################################
# GitHub Actions Workflow: Infrastructure Validation
# Validates Terraform and Helm configurations before deployment
################################################################################

name: Validate Infrastructure

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '01_INFRASTRUCTURE/terraform/**'
      - '04_KUBERNETES/helm/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches:
      - main
      - develop

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init (requires Azure credentials)
        working-directory: ./AZURE_DEPLOYMENT/01_INFRASTRUCTURE/terraform
        run: terraform init -no-color

      - name: Terraform Format Check
        working-directory: ./AZURE_DEPLOYMENT/01_INFRASTRUCTURE/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ./AZURE_DEPLOYMENT/01_INFRASTRUCTURE/terraform
        run: terraform validate -no-color

  helm-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Helm Lint
        working-directory: ./AZURE_DEPLOYMENT/04_KUBERNETES/helm
        run: helm lint . --strict

      - name: Helm Template Check
        working-directory: ./AZURE_DEPLOYMENT/04_KUBERNETES/helm
        run: helm template safaricom-cc . -f values-production.yaml > /tmp/rendered.yaml && wc -l /tmp/rendered.yaml
