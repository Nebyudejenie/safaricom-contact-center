---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: safaricom-cc-network-policy
  namespace: safaricom-cc
spec:
  podSelector:
    matchLabels:
      app: safaricom-cc
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: safaricom-cc
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: safaricom-cc
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432
